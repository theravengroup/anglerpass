"/fly-fishing/new-york":{"title":"Private Water Fly Fishing in New York | AnglerPass | AnglerPass","path":"/fly-fishing/new-york","category":"state-seo","requiresAuth":false,"forms":[],"ctas":["Explore Waters","Log In",""],"modals":[{"trigger":"Contact","title":"Contact AnglerPass"}],"ogImage":null},"/downloads/anglerpass-media-kit.zip":{"title":"","path":"/downloads/anglerpass-media-kit.zip","category":"other","requiresAuth":false,"forms":[],"ctas":[],"modals":[],"ogImage":null},"/dashboard/settings":{"title":"","path":"/dashboard/settings","category":"dashboard","requiresAuth":true,"forms":[],"ctas":[],"modals":[],"ogImage":null}};

const colorMap = {
  homepage: "#b8944e", audience: "#5a9aad", learn: "#4a7c5a",
  "state-seo": "#8a7a5a", auth: "#a05050", dashboard: "#7c5a9a",
  legal: "#666", join: "#5a9aad", other: "#555",
};

const sizeMap = {
  homepage: 18, audience: 12, learn: 6, "state-seo": 5,
  auth: 8, dashboard: 7, legal: 5, join: 8, other: 5,
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph").attr("width", width).attr("height", height);
const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", e => g.attr("transform", e.transform)));

// Force simulation
const nodeMap = new Map(nodes.map(n => [n.id, n]));
const validLinks = links.filter(l => nodeMap.has(l.source) && nodeMap.has(l.target));

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(validLinks).id(d => d.id).distance(80))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => (sizeMap[d.category] || 5) + 4));

const link = g.append("g").selectAll("line")
  .data(validLinks).enter().append("line").attr("class", "link");

const node = g.append("g").selectAll("g")
  .data(nodes).enter().append("g").attr("class", "node")
  .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd));

node.append("circle")
  .attr("r", d => sizeMap[d.category] || 5)
  .attr("fill", d => colorMap[d.category] || "#555")
  .attr("stroke", d => d.requiresAuth ? "#a05050" : "#b8944e")
  .attr("stroke-dasharray", d => d.requiresAuth ? "3,2" : "none");

node.append("text")
  .attr("dx", d => (sizeMap[d.category] || 5) + 4)
  .attr("dy", 3)
  .text(d => d.category === "homepage" ? "Home" : d.category === "learn" || d.category === "state-seo" ? "" : d.title?.split("|")[0]?.split("—")[0]?.trim().substring(0, 30) || d.id);

// Tooltip
const tooltip = d3.select("#tooltip");
node.on("mouseover", (event, d) => {
  const pg = pagesData[d.id] || {};
  let html = '<h3>' + (pg.title || d.id) + '</h3>';
  html += '<div class="meta">' + d.id + '</div>';
  if (d.requiresAuth) html += '<span class="badge badge-auth">🔒 Requires Auth</span>';
  if (d.formCount > 0) html += '<span class="badge badge-form">📝 ' + d.formCount + ' form(s)</span>';
  if (d.modalCount > 0) html += '<span class="badge badge-modal">💬 ' + d.modalCount + ' modal(s)</span>';
  html += '<div style="margin-top:8px;color:#a0a090">Links out: ' + d.linkCount + ' · CTAs: ' + d.ctaCount + '</div>';
  if (pg.ctas?.length > 0) html += '<div style="margin-top:6px;font-size:11px;color:#b8944e">CTAs: ' + pg.ctas.slice(0,5).join(", ") + '</div>';
  if (pg.modals?.length > 0) html += '<div style="margin-top:4px;font-size:11px;color:#d0a0f5">Modals: ' + pg.modals.map(m => m.trigger).join(", ") + '</div>';
  tooltip.html(html).style("display", "block").style("left", (event.clientX + 15) + "px").style("top", (event.clientY - 10) + "px");

  // Highlight connected links
  link.classed("highlighted", l => l.source.id === d.id || l.target.id === d.id);
}).on("mouseout", () => {
  tooltip.style("display", "none");
  link.classed("highlighted", false);
});

node.on("click", (event, d) => {
  window.open("https://anglerpass.com" + d.id, "_blank");
});

// Filter buttons
d3.selectAll("#controls button").on("click", function() {
  const filter = this.dataset.filter;
  d3.selectAll("#controls button").classed("active", false);
  d3.select(this).classed("active", true);
  node.style("opacity", d => filter === "all" || d.category === filter ? 1 : 0.1);
  link.style("opacity", filter === "all" ? 1 : 0.05);
});

sim.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
});

function dragStart(event, d) { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }
</script>
